services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sisonke}
      POSTGRES_USER: ${POSTGRES_USER:-sisonke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8

  migrate:
    build:
      context: ./backend
      target: build
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sisonke}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sisonke}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    command: ["npm", "run", "db:migrate"]

  backend:
    build:
      context: ./backend
      target: runner
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ollama:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-sisonke}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sisonke}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      FRONTEND_URL: https://sisonke.mmpzmne.co.zw,http://sisonke.mmpzmne.co.zw
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-300}
      LOCAL_AI_ENABLED: ${LOCAL_AI_ENABLED:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5:1.5b}
      OLLAMA_HEALTH_TIMEOUT_MS: ${OLLAMA_HEALTH_TIMEOUT_MS:-1500}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-12000}
      EXTERNAL_AI_FALLBACK_ENABLED: ${EXTERNAL_AI_FALLBACK_ENABLED:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_TIMEOUT_MS: ${GEMINI_TIMEOUT_MS:-15000}
      RAG_DB_TIMEOUT_MS: ${RAG_DB_TIMEOUT_MS:-1500}
    expose:
      - "3001"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  ollama_data:
  caddy_data:
  caddy_config:
