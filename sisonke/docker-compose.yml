services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    image: nginx:alpine
    restart: always
    ports:
      - "3016:80"
    volumes:
      - ./backend/public:/usr/share/nginx/html
    # Note: We will need to build the flutter web and move it to backend/public 
    # OR create a dedicated Dockerfile for the frontend.


  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sisonke}
      POSTGRES_USER: ${POSTGRES_USER:-sisonke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Brian7350}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-sisonke}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    # Note: If your VPS has a GPU, you can add the deploy.resources.reservations block here

volumes:
  postgres_data:
  ollama_data:

  # Optional: Nginx for reverse proxying and SSL (Certbot) on VPS
