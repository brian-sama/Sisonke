services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sisonke}
      POSTGRES_USER: ${POSTGRES_USER:-sisonke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Brian7350}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sisonke"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

  # Optional: Nginx for reverse proxying and SSL (Certbot) on VPS
