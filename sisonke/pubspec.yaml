name: sisonke
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^12.1.3

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # HTTP & API
  dio: ^5.3.0
  http: ^1.1.0
  
  # Utilities
  crypto: ^3.0.3
  intl: ^0.20.2
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.5
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.3
  local_auth: ^2.1.7
  sentry_flutter: ^8.0.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  home_widget: ^0.9.1
  cached_network_image: ^3.3.0
  google_fonts: ^6.2.1
  dynamic_color: ^1.7.0
  animations: ^2.0.11
  
  # Charts & UI
  table_calendar: ^3.0.8
  encrypt: ^5.0.3
  record: ^6.2.0

  # Icons
  cupertino_icons: ^1.0.8
  socket_io_client: ^3.1.4
  fl_chart: ^1.2.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_main"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

dependency_overrides:
  isar_flutter_libs:
    path: third_party/isar_flutter_libs
  record_linux: ^1.3.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/bootstrap/
    - assets/logo.png
